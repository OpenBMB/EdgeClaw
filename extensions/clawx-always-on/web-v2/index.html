<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>ClawX Always-On</title>
    <meta
      name="description"
      content="Operate queued, running, resumable, and planner-created background tasks from a focused control console."
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="app-frame" data-sidebar-open="false" data-sidebar-collapsed="false">
      <aside id="sidebar" class="sidebar" aria-label="Console navigation">
        <div class="sidebar__inner">
          <div class="sidebar__header">
            <button
              id="sidebar-toggle"
              class="sidebar-toggle"
              type="button"
              aria-controls="sidebar"
              aria-expanded="true"
            >
              <span class="sidebar-toggle__lines" aria-hidden="true"></span>
            </button>
            <div class="sidebar__brand">
              <h1 class="sidebar__title">ClawX Always-On</h1>
            </div>
          </div>
          <nav id="sidebar-nav" class="sidebar__nav" aria-label="Console sections">
            <button
              id="nav-button-overview"
              class="sidebar-button"
              type="button"
              data-tab="overview"
              aria-controls="tab-panel-overview"
            >
              <span class="sidebar-button__glyph" aria-hidden="true">O</span>
              <span class="sidebar-button__label">Overview</span>
            </button>
            <button
              id="nav-button-compose"
              class="sidebar-button"
              type="button"
              data-tab="compose"
              aria-controls="tab-panel-compose"
            >
              <span class="sidebar-button__glyph" aria-hidden="true">C</span>
              <span class="sidebar-button__label">Compose</span>
            </button>
            <button
              id="nav-button-tasks"
              class="sidebar-button"
              type="button"
              data-tab="tasks"
              aria-controls="tab-panel-tasks"
            >
              <span class="sidebar-button__glyph" aria-hidden="true">T</span>
              <span class="sidebar-button__label">Tasks</span>
            </button>
            <button
              id="nav-button-activity"
              class="sidebar-button"
              type="button"
              data-tab="activity"
              aria-controls="tab-panel-activity"
            >
              <span class="sidebar-button__glyph" aria-hidden="true">A</span>
              <span class="sidebar-button__label">Activity</span>
            </button>
            <button
              id="nav-button-config"
              class="sidebar-button"
              type="button"
              data-tab="config"
              aria-controls="tab-panel-config"
            >
              <span class="sidebar-button__glyph" aria-hidden="true">G</span>
              <span class="sidebar-button__label">Config</span>
            </button>
          </nav>
        </div>
      </aside>

      <button
        id="sidebar-overlay"
        class="sidebar-overlay"
        type="button"
        aria-label="Close navigation"
        hidden
      ></button>

      <div class="app-region">
        <header class="topbar">
          <div class="topbar__inner">
            <div class="topbar__row topbar__row--compact">
              <h2 id="topbar-title" class="topbar__title topbar__title--compact">ClawX Always-On</h2>
              <div class="topbar__controls topbar__controls--inline">
                <button
                  id="refresh-button"
                  class="button button--ghost button--pill button--icon-only"
                  type="button"
                  aria-label="Refresh"
                  title="Refresh"
                >
                  <span class="button__icon button__icon--refresh" aria-hidden="true">
                    <svg viewBox="0 0 24 24" focusable="false">
                      <path d="M21 12a9 9 0 1 1-2.64-6.36" />
                      <path d="M21 3v6h-6" />
                    </svg>
                  </span>
                </button>
              </div>
            </div>
          </div>
        </header>

        <div
          id="status-banner"
          class="status-banner"
          role="status"
          aria-live="polite"
          aria-atomic="true"
          hidden
        ></div>

        <main class="app-shell">
          <section class="workspace">
            <div class="workspace__inner">
              <section
                id="tab-panel-overview"
                class="tab-panel"
                data-tab-panel="overview"
                role="region"
                aria-labelledby="nav-button-overview"
              >
                <div class="overview-grid">
                  <section class="panel panel--dark overview-panel">
                    <div class="panel__header">
                      <h2>Runtime snapshot</h2>
                    </div>
                    <div id="overview-summary" class="summary-grid" aria-live="polite"></div>
                    <div id="overview-running" class="signal-list" aria-live="polite"></div>
                  </section>

                  <section class="panel queue-panel">
                    <div class="panel__header">
                      <h2>Queue</h2>
                    </div>
                    <div id="overview-queue" class="queue-sections" aria-live="polite"></div>
                  </section>
                </div>
              </section>

              <section
                id="tab-panel-compose"
                class="tab-panel"
                data-tab-panel="compose"
                role="region"
                aria-labelledby="nav-button-compose"
                hidden
              >
                <div class="compose-shell">
                  <section class="panel compose-panel">
                    <div class="panel__header panel__header--compact">
                      <div>
                        <h2>Compose</h2>
                      </div>
                      <div id="compose-mode-switch" class="mode-switch"></div>
                    </div>
                    <div id="compose-thread" class="compose-thread" aria-live="polite"></div>
                    <div id="compose-composer" class="compose-composer" aria-live="polite"></div>
                  </section>

                  <aside class="panel compose-sidecar">
                    <div class="panel__header panel__header--compact">
                      <div>
                        <h2>Defaults</h2>
                      </div>
                      <button class="button button--secondary" type="button" data-ui-action="open-config">
                        Config
                      </button>
                    </div>
                    <div id="compose-defaults" class="compose-defaults" aria-live="polite"></div>
                  </aside>
                </div>
              </section>

              <section
                id="tab-panel-tasks"
                class="tab-panel"
                data-tab-panel="tasks"
                role="region"
                aria-labelledby="nav-button-tasks"
                hidden
              >
                <div class="workspace__grid workspace__grid--single">
                  <aside class="panel task-browser">
                    <div id="filter-strip" class="filter-strip" aria-label="Task filters"></div>
                    <div id="task-list" class="task-list" aria-live="polite"></div>
                  </aside>
                </div>
              </section>

              <section
                id="tab-panel-activity"
                class="tab-panel"
                data-tab-panel="activity"
                role="region"
                aria-labelledby="nav-button-activity"
                hidden
              >
                <div class="activity-grid">
                  <aside class="panel activity-sidebar">
                    <div class="panel__header">
                      <h2>Activity</h2>
                    </div>
                    <div id="activity-task-list" class="activity-task-list" aria-live="polite"></div>
                  </aside>

                  <section class="panel activity-panel">
                    <div class="panel__header panel__header--compact">
                      <div>
                        <h2 id="activity-title">Recent events</h2>
                        <p id="activity-subtitle" class="muted-copy">Select a task.</p>
                      </div>
                      <div id="activity-pill" class="activity-pill"></div>
                    </div>
                    <div id="activity-detail" class="activity-detail" aria-live="polite"></div>
                    <div id="activity-stream" class="activity-stream" aria-live="polite"></div>
                  </section>
                </div>
              </section>

              <section
                id="tab-panel-config"
                class="tab-panel"
                data-tab-panel="config"
                role="region"
                aria-labelledby="nav-button-config"
                hidden
              >
                <div class="config-grid">
                  <section class="panel config-panel">
                    <div class="panel__header panel__header--compact">
                      <div>
                        <h2>Config</h2>
                      </div>
                      <button class="button button--secondary" type="button" data-ui-action="reload-config">
                        Reload
                      </button>
                    </div>
                    <div id="config-content" class="config-content" aria-live="polite"></div>
                  </section>

                  <aside class="panel config-sidecar">
                    <div class="panel__header">
                      <h2>Apply mode</h2>
                    </div>
                    <div class="info-stack">
                      <div class="surface-card">
                        <div class="surface-card__header">
                          <h3>Immediate</h3>
                        </div>
                        <p class="hint-copy">
                          Loops, cost, concurrency, log level, and retention update in place.
                        </p>
                      </div>
                      <div class="surface-card surface-card--muted">
                        <div class="surface-card__header">
                          <h3>Restart</h3>
                        </div>
                        <p class="hint-copy">
                          Data Directory writes to <span class="mono">openclaw.json</span> and applies next
                          start.
                        </p>
                      </div>
                    </div>
                  </aside>
                </div>
              </section>
            </div>
          </section>
        </main>
      </div>
    </div>

    <script type="module" src="./app.js"></script>
  </body>
</html>
